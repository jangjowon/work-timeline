<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="OKR dashboard placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F1E8" />
      <stop offset="100%" stop-color="#E8E2D6" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />

  <!-- header -->
  <rect x="72" y="72" width="260" height="18" rx="4" fill="#2B2A27" opacity="0.85" />
  <rect x="72" y="104" width="420" height="12" rx="4" fill="#6B6862" opacity="0.6" />

  <!-- cards row -->
  <g transform="translate(72,160)">
    <rect x="0" y="0" width="320" height="160" rx="12" fill="#FFFFFF" stroke="#E8E2D6" />
    <rect x="20" y="22" width="110" height="10" rx="3" fill="#9A958C" />
    <text x="20" y="88" font-family="Georgia, serif" font-size="40" fill="#3F7D5C" font-weight="700">82%</text>
    <rect x="20" y="112" width="240" height="8" rx="4" fill="#DDE8E0" />
    <rect x="20" y="112" width="196" height="8" rx="4" fill="#3F7D5C" />

    <rect x="368" y="0" width="320" height="160" rx="12" fill="#FFFFFF" stroke="#E8E2D6" />
    <rect x="388" y="22" width="110" height="10" rx="3" fill="#9A958C" />
    <text x="388" y="88" font-family="Georgia, serif" font-size="40" fill="#3F7D5C" font-weight="700">1.4×</text>
    <rect x="388" y="112" width="240" height="8" rx="4" fill="#DDE8E0" />
    <rect x="388" y="112" width="260" height="8" rx="4" fill="#3F7D5C" />

    <rect x="736" y="0" width="320" height="160" rx="12" fill="#FFFFFF" stroke="#E8E2D6" />
    <rect x="756" y="22" width="110" height="10" rx="3" fill="#9A958C" />
    <text x="756" y="88" font-family="Georgia, serif" font-size="40" fill="#2B2A27" font-weight="700">3 / 5</text>
    <rect x="756" y="112" width="240" height="8" rx="4" fill="#DDE8E0" />
    <rect x="756" y="112" width="144" height="8" rx="4" fill="#3F7D5C" />
  </g>

  <!-- chart -->
  <g transform="translate(72,372)">
    <rect x="0" y="0" width="1056" height="220" rx="12" fill="#FFFFFF" stroke="#E8E2D6" />
    <rect x="24" y="20" width="180" height="10" rx="3" fill="#2B2A27" opacity="0.8" />
    <polyline
      fill="none"
      stroke="#3F7D5C"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="40,170 160,150 280,155 400,120 520,130 640,95 760,100 880,75 1000,60"
    />
    <g fill="#3F7D5C">
      <circle cx="40" cy="170" r="4" />
      <circle cx="160" cy="150" r="4" />
      <circle cx="280" cy="155" r="4" />
      <circle cx="400" cy="120" r="4" />
      <circle cx="520" cy="130" r="4" />
      <circle cx="640" cy="95" r="4" />
      <circle cx="760" cy="100" r="4" />
      <circle cx="880" cy="75" r="4" />
      <circle cx="1000" cy="60" r="4" />
    </g>
    <g stroke="#E8E2D6" stroke-width="1">
      <line x1="24" y1="60" x2="1032" y2="60" />
      <line x1="24" y1="110" x2="1032" y2="110" />
      <line x1="24" y1="160" x2="1032" y2="160" />
    </g>
  </g>

  <text x="600" y="640" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#9A958C" font-style="italic">
    Sample dashboard illustration
  </text>
</svg>
